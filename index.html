<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlyphFlow — Kinetic Text Art</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg-primary: #09090b;
      --bg-panel: #0f0f13;
      --bg-surface: #18181d;
      --bg-input: #1c1c24;
      --border: #27272a;
      --border-hover: #3f3f46;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: #8b5cf6;
      --accent-hover: #7c3aed;
      --accent-subtle: rgba(139, 92, 246, 0.12);
      --danger: #ef4444;
      --radius: 8px;
      --radius-sm: 6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    .app { display: flex; height: 100vh; }

    /* ── Panel ── */
    .panel {
      width: 340px; min-width: 340px;
      background: var(--bg-panel);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    .panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
    }
    .brand { display: flex; align-items: center; gap: 8px; font-weight: 700; font-size: 0.95rem; letter-spacing: -0.3px; }
    .badge {
      font-size: 0.6rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
      color: var(--accent); background: var(--accent-subtle);
      padding: 2px 8px; border-radius: 10px;
    }

    .panel-body { flex: 1; overflow-y: auto; padding: 4px 0; }
    .panel-body::-webkit-scrollbar { width: 4px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Sections ── */
    .section { border-bottom: 1px solid var(--border); }
    .section-toggle {
      width: 100%; display: flex; align-items: center; gap: 8px;
      padding: 10px 16px; background: none; border: none; color: var(--text-secondary);
      font: 500 0.75rem/1 'Inter', sans-serif; text-transform: uppercase; letter-spacing: 0.6px;
      cursor: pointer; transition: color 0.15s;
    }
    .section-toggle:hover { color: var(--text-primary); }
    .section-icon { font-size: 0.8rem; width: 16px; text-align: center; }
    .chevron {
      margin-left: auto; font-size: 0.9rem; transition: transform 0.2s;
      transform: rotate(-90deg);
    }
    .section-toggle[aria-expanded="true"] .chevron { transform: rotate(0deg); }
    .section-content { padding: 0 16px 12px; display: flex; flex-direction: column; gap: 10px; }
    .section-content.collapsed { display: none; }

    /* ── Fields ── */
    .field { display: flex; flex-direction: column; gap: 4px; }
    .field-row { display: flex; gap: 8px; }
    .field-sm { max-width: 80px; }

    label {
      font-size: 0.7rem; font-weight: 500; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.4px;
      display: flex; align-items: center; gap: 6px;
    }
    .val { color: var(--accent); font-family: 'JetBrains Mono', monospace; font-size: 0.65rem; }

    textarea {
      width: 100%; background: var(--bg-input); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 8px 10px; font: 400 13px/1.5 'Inter', sans-serif;
      resize: vertical; min-height: 72px; transition: border-color 0.15s;
    }
    textarea:focus { outline: none; border-color: var(--accent); }

    select, input[type="number"] {
      width: 100%; background: var(--bg-input); color: var(--text-primary);
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 6px 10px; font: 400 0.8rem 'Inter', sans-serif;
      transition: border-color 0.15s; appearance: none;
      background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%2371717a' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 10px center;
    }
    input[type="number"] { background-image: none; -moz-appearance: textfield; }
    input[type="number"]::-webkit-inner-spin-button { opacity: 1; }
    select:focus, input[type="number"]:focus { outline: none; border-color: var(--accent); }

    input[type="range"] {
      width: 100%; height: 4px; -webkit-appearance: none; appearance: none;
      background: var(--border); border-radius: 2px; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: var(--accent); cursor: pointer; border: 2px solid var(--bg-panel);
      box-shadow: 0 0 0 1px var(--accent);
    }

    /* ── Chips ── */
    .chip-grid { display: flex; flex-wrap: wrap; gap: 4px; }
    .chip-grid button {
      background: var(--bg-input); color: var(--text-secondary);
      border: 1px solid var(--border); border-radius: 4px;
      padding: 4px 10px; font: 500 0.7rem 'Inter', sans-serif;
      cursor: pointer; transition: all 0.15s; letter-spacing: 0.2px;
    }
    .chip-grid button:hover { color: var(--text-primary); border-color: var(--accent); background: var(--accent-subtle); }

    /* ── Toolbar ── */
    .toolbar {
      display: flex; gap: 6px; padding: 10px 16px;
      border-top: 1px solid var(--border); background: var(--bg-surface);
    }
    .tb-btn {
      flex: 1; display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 8px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: var(--bg-input); color: var(--text-secondary);
      font: 600 0.75rem 'Inter', sans-serif; cursor: pointer; transition: all 0.15s;
    }
    .tb-btn:hover { color: var(--text-primary); border-color: var(--border-hover); }
    .tb-primary { background: var(--accent); color: white; border-color: var(--accent); }
    .tb-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }
    .tb-primary.paused { background: var(--danger); border-color: var(--danger); }

    /* ── Footer ── */
    .panel-footer {
      padding: 10px 16px; border-top: 1px solid var(--border);
      font-size: 0.65rem; color: var(--text-muted); line-height: 1.6;
    }
    .panel-footer a { color: var(--text-secondary); text-decoration: none; }
    .panel-footer a:hover { color: var(--accent); }
    .footer-links { display: flex; gap: 8px; margin-top: 4px; }
    .footer-links a {
      padding: 2px 8px; border: 1px solid var(--border); border-radius: 4px;
      font-size: 0.6rem; font-weight: 500; transition: all 0.15s;
    }
    .footer-links a:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-subtle); }

    /* ── Canvas ── */
    .canvas-area {
      flex: 1; display: flex; align-items: center; justify-content: center;
      position: relative; background: var(--bg-primary);
    }
    canvas { background: var(--bg-primary); }
    .hud {
      position: absolute; top: 12px; right: 16px;
      font: 400 0.65rem 'JetBrains Mono', monospace; color: var(--text-muted);
      background: rgba(15,15,19,0.7); padding: 2px 8px; border-radius: 4px;
    }

    /* ── Fullscreen ── */
    .app.fullscreen .panel { display: none; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <header class="panel-header">
        <div class="brand">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--accent)">
            <path d="M12 3v18M3 12h18M5.6 5.6l12.8 12.8M18.4 5.6 5.6 18.4"/>
          </svg>
          <span>GlyphFlow</span>
        </div>
        <span class="badge">Editor</span>
      </header>

      <div class="panel-body">
        <!-- Text -->
        <section class="section">
          <button class="section-toggle" data-target="sec-text" aria-expanded="true">
            <span class="section-icon">✎</span> Text <span class="chevron">‹</span>
          </button>
          <div class="section-content" id="sec-text">
            <textarea id="textInput" rows="3" spellcheck="false">The quick brown fox jumps over the lazy dog beneath a sky full of stars and endless possibilities</textarea>
          </div>
        </section>

        <!-- Themes -->
        <section class="section">
          <button class="section-toggle" data-target="sec-themes" aria-expanded="true">
            <span class="section-icon">◆</span> Themes <span class="chevron">‹</span>
          </button>
          <div class="section-content" id="sec-themes">
            <div class="chip-grid" id="themes"></div>
          </div>
        </section>

        <!-- Text Presets -->
        <section class="section">
          <button class="section-toggle" data-target="sec-presets" aria-expanded="true">
            <span class="section-icon">¶</span> Text Presets <span class="chevron">‹</span>
          </button>
          <div class="section-content" id="sec-presets">
            <div class="chip-grid" id="presets"></div>
          </div>
        </section>

        <!-- Typography -->
        <section class="section">
          <button class="section-toggle" data-target="sec-type" aria-expanded="true">
            <span class="section-icon">Aa</span> Typography <span class="chevron">‹</span>
          </button>
          <div class="section-content" id="sec-type">
            <div class="field-row">
              <div class="field">
                <label for="fontSelect">Font</label>
                <select id="fontSelect">
                  <option value="Inter">Inter</option>
                  <option value="Playfair Display">Playfair Display</option>
                  <option value="JetBrains Mono">JetBrains Mono</option>
                </select>
              </div>
              <div class="field field-sm">
                <label for="fontSize">Size</label>
                <input type="number" id="fontSize" value="28" min="12" max="80" />
              </div>
            </div>
            <div class="field">
              <label for="lineHeight">Line height <span class="val" id="lhVal">1.4</span></label>
              <input type="range" id="lineHeight" min="1" max="2.5" step="0.1" value="1.4" />
            </div>
          </div>
        </section>

        <!-- Shape & Color -->
        <section class="section">
          <button class="section-toggle" data-target="sec-shape" aria-expanded="true">
            <span class="section-icon">◇</span> Shape &amp; Color <span class="chevron">‹</span>
          </button>
          <div class="section-content" id="sec-shape">
            <div class="field">
              <label for="shapeSelect">Width shape</label>
              <select id="shapeSelect">
                <option value="sine">Sine wave</option>
                <option value="funnel">Funnel</option>
                <option value="diamond">Diamond</option>
                <option value="heartbeat">Heartbeat</option>
                <option value="zigzag">Zigzag</option>
                <option value="spiral">Spiral</option>
                <option value="collapse">Wave collapse</option>
                <option value="hourglass">Hourglass</option>
                <option value="staircase">Staircase</option>
                <option value="static">Static</option>
              </select>
            </div>
            <div class="field">
              <label for="colorSelect">Color mode</label>
              <select id="colorSelect">
                <option value="gradient">Width gradient</option>
                <option value="rainbow">Rainbow</option>
                <option value="thermal">Thermal</option>
                <option value="mono">Monochrome</option>
                <option value="ocean">Ocean</option>
                <option value="neon">Neon</option>
                <option value="sunset">Sunset</option>
                <option value="forest">Forest</option>
                <option value="cyberpunk">Cyberpunk</option>
              </select>
            </div>
          </div>
        </section>

        <!-- Animation -->
        <section class="section">
          <button class="section-toggle" data-target="sec-anim" aria-expanded="true">
            <span class="section-icon">▸</span> Animation <span class="chevron">‹</span>
          </button>
          <div class="section-content" id="sec-anim">
            <div class="field">
              <label for="speed">Speed <span class="val" id="speedVal">1.0</span>x</label>
              <input type="range" id="speed" min="0.1" max="3" step="0.1" value="1" />
            </div>
          </div>
        </section>
      </div>

      <!-- Toolbar -->
      <div class="toolbar">
        <button class="tb-btn tb-primary" id="playBtn" title="Pause animation">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          <span>Pause</span>
        </button>
        <button class="tb-btn" id="saveBtn" title="Export as PNG">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>PNG</span>
        </button>
      </div>

      <!-- Footer -->
      <footer class="panel-footer">
        <span>Powered by <a href="https://github.com/chenglou/pretext" target="_blank" rel="noopener">Pretext</a> by <a href="https://github.com/chenglou" target="_blank" rel="noopener">Cheng Lou</a></span>
        <div class="footer-links">
          <a href="https://github.com/hubertlim/GlyphFlow" target="_blank" rel="noopener">⭐ Star</a>
          <a href="https://github.com/hubertlim/GlyphFlow/fork" target="_blank" rel="noopener">Fork</a>
          <a href="https://github.com/hubertlim/GlyphFlow/issues" target="_blank" rel="noopener">Ideas</a>
        </div>
      </footer>
    </aside>

    <main class="canvas-area">
      <canvas id="canvas"></canvas>
      <div class="hud" id="fps"></div>
    </main>
  </div>

  <script>
    // Collapsible sections
    document.querySelectorAll('.section-toggle').forEach(btn => {
      btn.addEventListener('click', () => {
        const expanded = btn.getAttribute('aria-expanded') === 'true'
        btn.setAttribute('aria-expanded', !expanded)
        document.getElementById(btn.dataset.target).classList.toggle('collapsed', expanded)
      })
    })
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
