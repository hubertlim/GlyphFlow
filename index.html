<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pretext Demo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0f172a; color: #e2e8f0; padding: 2rem; }
    h1 { font-size: 1.8rem; margin-bottom: 0.5rem; color: #38bdf8; }
    p.subtitle { color: #94a3b8; margin-bottom: 2rem; }
    .demos { display: flex; flex-direction: column; gap: 2rem; max-width: 900px; margin: 0 auto; }
    .card { background: #1e293b; border-radius: 12px; padding: 1.5rem; border: 1px solid #334155; }
    .card h2 { font-size: 1.1rem; color: #7dd3fc; margin-bottom: 0.75rem; }
    .card label { display: block; color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.25rem; }
    .card input[type="range"] { width: 100%; accent-color: #38bdf8; }
    .card textarea { width: 100%; background: #0f172a; color: #e2e8f0; border: 1px solid #475569;
      border-radius: 6px; padding: 0.5rem; font-family: 'Inter', sans-serif; font-size: 16px;
      resize: vertical; min-height: 60px; }
    .stats { display: flex; gap: 1.5rem; margin: 0.75rem 0; font-size: 0.9rem; color: #94a3b8; }
    .stats span { color: #38bdf8; font-weight: 600; }
    canvas { border: 1px solid #334155; border-radius: 6px; background: #0f172a; width: 100%; }
  </style>
</head>
<body>
  <div class="demos">
    <div>
      <h1>Pretext Demo</h1>
      <p class="subtitle">Pure JS text measurement &amp; layout — zero DOM reflow</p>
    </div>

    <!-- Demo 1: Height measurement -->
    <div class="card" id="demo1">
      <h2>1. Paragraph Height Without DOM</h2>
      <label for="d1text">Text</label>
      <textarea id="d1text" rows="2">Pretext measures text height using pure arithmetic — no DOM reflow needed. Resize the width slider to see instant recalculation. Supports multilingual: 春天到了 بدأت الرحلة 🚀</textarea>
      <label for="d1width">Max width: <span id="d1widthVal">400</span>px</label>
      <input type="range" id="d1width" min="100" max="800" value="400" />
      <div class="stats">
        Height: <span id="d1height">—</span>px &nbsp;|&nbsp; Lines: <span id="d1lines">—</span>
      </div>
    </div>

    <!-- Demo 2: Canvas rendering -->
    <div class="card" id="demo2">
      <h2>2. Canvas Rendering with Line Layout</h2>
      <label for="d2text">Text</label>
      <textarea id="d2text" rows="2">Pretext can lay out text line-by-line and render directly to Canvas, SVG, or WebGL. This bypasses the DOM entirely. Each line is measured and positioned with sub-pixel accuracy.</textarea>
      <label for="d2width">Max width: <span id="d2widthVal">500</span>px</label>
      <input type="range" id="d2width" min="120" max="800" value="500" />
      <canvas id="d2canvas" height="200"></canvas>
    </div>

    <!-- Demo 3: Shrink-wrap -->
    <div class="card" id="demo3">
      <h2>3. Shrink-Wrap: Tightest Fitting Width</h2>
      <label for="d3text">Text</label>
      <textarea id="d3text" rows="2">Find the tightest container width that still fits the text without adding extra lines. This "shrink-wrap" has been missing from the web.</textarea>
      <label for="d3width">Starting max width: <span id="d3widthVal">600</span>px</label>
      <input type="range" id="d3width" min="120" max="800" value="600" />
      <div class="stats">
        Shrink-wrapped width: <span id="d3shrink">—</span>px &nbsp;|&nbsp; Lines: <span id="d3lines">—</span>
      </div>
      <canvas id="d3canvas" height="160"></canvas>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
