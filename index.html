<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GlyphFlow — Kinetic Text Art</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0f; color: #e2e8f0; overflow-x: hidden; }
    .app { display: flex; height: 100vh; }

    /* Sidebar */
    .sidebar { width: 320px; min-width: 320px; background: #111118; border-right: 1px solid #1e1e2e;
      padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; overflow-y: auto; }
    .logo { font-size: 1.4rem; font-weight: 700; color: #a78bfa; letter-spacing: -0.5px; }
    .logo small { font-size: 0.7rem; font-weight: 400; color: #6b7280; display: block; }
    label { font-size: 0.8rem; color: #9ca3af; display: block; margin-bottom: 0.2rem; }
    textarea { width: 100%; background: #1a1a24; color: #e2e8f0; border: 1px solid #2e2e3e;
      border-radius: 8px; padding: 0.5rem; font-family: 'Inter', sans-serif; font-size: 14px;
      resize: vertical; min-height: 80px; }
    select, input[type="number"] { width: 100%; background: #1a1a24; color: #e2e8f0;
      border: 1px solid #2e2e3e; border-radius: 8px; padding: 0.4rem 0.5rem; font-size: 0.85rem; }
    input[type="range"] { width: 100%; accent-color: #a78bfa; }
    .row { display: flex; gap: 0.5rem; }
    .row > * { flex: 1; }
    .presets { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .presets button { background: #1a1a24; color: #c4b5fd; border: 1px solid #2e2e3e;
      border-radius: 6px; padding: 0.3rem 0.6rem; font-size: 0.75rem; cursor: pointer;
      transition: background 0.15s; }
    .presets button:hover { background: #2e2e3e; }
    .actions { display: flex; gap: 0.5rem; margin-top: auto; }
    .actions button { flex: 1; padding: 0.5rem; border-radius: 8px; border: none; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; transition: background 0.15s; }
    .btn-play { background: #7c3aed; color: white; }
    .btn-play:hover { background: #6d28d9; }
    .btn-play.paused { background: #dc2626; }
    .btn-save { background: #1a1a24; color: #a78bfa; border: 1px solid #2e2e3e !important; }
    .btn-save:hover { background: #2e2e3e; }
    .btn-link { background: #1a1a24; color: #a78bfa; border: 1px solid #2e2e3e !important; }
    .btn-link:hover { background: #2e2e3e; }
    .btn-link.copied { background: #065f46; color: #6ee7b7; border-color: #059669 !important; }
    .btn-fs { background: #1a1a24; color: #a78bfa; border: 1px solid #2e2e3e !important; }
    .btn-fs:hover { background: #2e2e3e; }
    .actions-row2 { display: flex; gap: 0.5rem; }
    .actions-row2 button { flex: 1; padding: 0.5rem; border-radius: 8px; border: none; font-size: 0.85rem;
      font-weight: 600; cursor: pointer; transition: background 0.15s; }

    /* Fullscreen */
    .app.fullscreen .sidebar { display: none; }
    .app.fullscreen .canvas-wrap { width: 100vw; }

    /* Footer */
    .footer { padding: 0.75rem 1.25rem; border-top: 1px solid #1e1e2e; font-size: 0.7rem; color: #6b7280; }
    .footer a { color: #a78bfa; text-decoration: none; }
    .footer a:hover { text-decoration: underline; }
    .footer-links { display: flex; gap: 1rem; margin-top: 0.4rem; }
    .footer-links a { display: inline-flex; align-items: center; gap: 0.3rem; color: #9ca3af;
      font-size: 0.7rem; padding: 0.2rem 0.5rem; border: 1px solid #2e2e3e; border-radius: 4px;
      transition: all 0.15s; }
    .footer-links a:hover { color: #c4b5fd; border-color: #7c3aed; background: #1a1a24; }

    /* Canvas area */
    .canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; }
    canvas { background: #0a0a0f; }
    .fps { position: absolute; top: 12px; right: 16px; font-size: 0.7rem; color: #4b5563; font-family: 'JetBrains Mono', monospace; }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="logo">GlyphFlow<small>Kinetic text art powered by Pretext</small></div>

      <div>
        <label for="textInput">Text</label>
        <textarea id="textInput" rows="3">The quick brown fox jumps over the lazy dog beneath a sky full of stars and endless possibilities</textarea>
      </div>

      <div>
        <label>Themes</label>
        <div class="presets" id="themes"></div>
      </div>

      <div>
        <label>Text presets</label>
        <div class="presets" id="presets"></div>
      </div>

      <div class="row">
        <div>
          <label for="fontSelect">Font</label>
          <select id="fontSelect">
            <option value="Inter">Inter</option>
            <option value="Playfair Display">Playfair Display</option>
            <option value="JetBrains Mono">JetBrains Mono</option>
          </select>
        </div>
        <div>
          <label for="fontSize">Size</label>
          <input type="number" id="fontSize" value="28" min="12" max="80" />
        </div>
      </div>

      <div>
        <label for="shapeSelect">Width shape</label>
        <select id="shapeSelect">
          <option value="sine">Sine wave</option>
          <option value="funnel">Funnel</option>
          <option value="diamond">Diamond</option>
          <option value="heartbeat">Heartbeat</option>
          <option value="zigzag">Zigzag</option>
          <option value="spiral">Spiral</option>
          <option value="collapse">Wave collapse</option>
          <option value="hourglass">Hourglass</option>
          <option value="staircase">Staircase</option>
          <option value="static">Static</option>
        </select>
      </div>

      <div>
        <label for="colorSelect">Color mode</label>
        <select id="colorSelect">
          <option value="gradient">Width gradient</option>
          <option value="rainbow">Rainbow</option>
          <option value="thermal">Thermal</option>
          <option value="mono">Monochrome</option>
          <option value="ocean">Ocean</option>
          <option value="neon">Neon</option>
          <option value="sunset">Sunset</option>
          <option value="forest">Forest</option>
          <option value="cyberpunk">Cyberpunk</option>
        </select>
      </div>

      <div>
        <label for="speed">Animation speed: <span id="speedVal">1.0</span>x</label>
        <input type="range" id="speed" min="0.1" max="3" step="0.1" value="1" />
      </div>

      <div>
        <label for="lineHeight">Line height: <span id="lhVal">1.4</span></label>
        <input type="range" id="lineHeight" min="1" max="2.5" step="0.1" value="1.4" />
      </div>

      <div class="actions">
        <button class="btn-play" id="playBtn">⏸ Pause</button>
        <button class="btn-save" id="saveBtn">💾 Save PNG</button>
      </div>
      <div class="actions-row2">
        <button class="btn-link" id="linkBtn">🔗 Copy Link</button>
        <button class="btn-fs" id="fsBtn">⛶ Fullscreen</button>
      </div>

      <div class="footer">
        Powered by <a href="https://github.com/chenglou/pretext" target="_blank" rel="noopener">Pretext</a>
        by <a href="https://github.com/chenglou" target="_blank" rel="noopener">Cheng Lou</a>
        <div class="footer-links">
          <a href="https://github.com/hubertlim/GlyphFlow" target="_blank" rel="noopener">⭐ Star</a>
          <a href="https://github.com/hubertlim/GlyphFlow/fork" target="_blank" rel="noopener">🍴 Fork</a>
          <a href="https://github.com/hubertlim/GlyphFlow/issues" target="_blank" rel="noopener">💡 Ideas</a>
        </div>
      </div>
    </aside>

    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
      <div class="fps" id="fps"></div>
    </div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
